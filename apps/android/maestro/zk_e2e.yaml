# DogTag Android mobile end-to-end flow — on-device ZK proof pipeline.
#
# This is the mobile e2e the audit could previously only review by reading (no device in the lab).
# It drives the app on a real Android runtime (arm64 emulator or device) and exercises the REAL
# native code path the privacy-preserving groomer export uses — with no camera, biometric, or
# network — via the debug-only ZK self-test on the Profile screen:
#
#   1. Trust core   — the Verify tab recomputes a Merkle root through the Rust SDK over UniFFI
#                     (native .so) and asserts it equals the server's (import/issuance trust core).
#   2. ZK pipeline  — the Profile "ZK self-test" runs, on-device:
#                       signConsentEddsa → verifyConsentEddsa → proveVerification (Groth16, graph
#                       witness calculator + bundled zkey) → public-signal check vs the server-
#                       recomputed vector → keyHash + consent-key bind digest.
#                     PASS only if the device proof reproduces the exact 7 public signals.
#
# Prerequisites (see docs/MOBILE_BUILD.md and apps/android/AGENTS.md):
#   - jniLibs/<abi>/*.so built with cargo-ndk (the native prover; gitignored).
#   - assets/verification_final.zkey + assets/verification.graph vendored (gitignored).
#   - assets/zk_selftest.json present (committed; regenerated by the prove_parity dump test).
#   - A DEBUG build installed on a 64-bit (arm64) runtime — the self-test card is BuildConfig.DEBUG.
#
# Run:  maestro test apps/android/maestro/zk_e2e.yaml
appId: io.liberalize.dogtag
---
- launchApp:
    clearState: true

# --- 1. Trust core: native Merkle parity (mobile root == server root) ---
- tapOn:
    text: "Verify"
- assertVisible: "Trust-core parity"
- assertVisible: "mobile root == server root: PASS"

# --- 2. On-device ZK proof pipeline (Profile → ZK self-test) ---
- tapOn:
    text: "Profile"
- scrollUntilVisible:
    element:
      text: "Run ZK self-test"
    direction: DOWN
    timeout: 20000
- tapOn:
    text: "Run ZK self-test"
# Groth16 proving on an emulator can take a while; wait generously for the PASS line.
- extendedWaitUntil:
    visible: "ZK-SELFTEST: PASS"
    timeout: 180000
- assertVisible: "ZK-SELFTEST: PASS"
