# DogTag iOS mobile end-to-end flow — on-device ZK proof pipeline.
#
# The iOS mirror of apps/android/maestro/zk_e2e.yaml. It drives the app on a real iOS runtime
# (arm64 simulator or device) and exercises the REAL native code path the privacy-preserving
# groomer export uses — with no camera, biometric, or network — via the debug-only ZK self-test on
# the Profile screen (the iOS prover: UniFFI → Swift bindings → the Rust prover):
#
#   1. Trust core   — the Verify tab recomputes a Merkle root through the Rust SDK over UniFFI
#                     (DogTagFFI.xcframework) and asserts it equals the server's (import/issuance
#                     trust core).
#   2. ZK pipeline  — the Profile "ZK self-test" runs, on-device:
#                       signConsentEddsa → proveVerification (Groth16, graph witness calculator +
#                       bundled zkey) → public-signal check vs the server-recomputed vector →
#                       keyHash + consent-key bind digest.
#                     PASS only if the device proof reproduces the exact 7 public signals.
#
# Prerequisites (see docs/MOBILE_BUILD.md and apps/ios/AGENTS.md):
#   - DogTagFFI.xcframework built (the native prover + UniFFI; gitignored) — cargo build for
#     aarch64-apple-ios-sim --features prover, then `xcodebuild -create-xcframework`.
#   - DogTag/verification_final.zkey + DogTag/verification.graph vendored (gitignored).
#   - DogTag/zk_selftest.json present (committed; regenerated by the prove_parity dump test).
#   - A DEBUG build installed on a 64-bit (arm64) simulator — the self-test card is `#if DEBUG`.
#
# Run:  maestro test apps/ios/maestro/zk_e2e.yaml
appId: io.liberalize.dogtag
---
- launchApp:
    clearState: true

# --- 1. Trust core: native Merkle parity (mobile root == server root) ---
- tapOn:
    text: "Verify"
- assertVisible: "Trust-core parity"
- assertVisible: "mobile root == server root: PASS"

# --- 2. On-device ZK proof pipeline (Profile → ZK self-test) ---
- tapOn:
    text: "Profile"
- scrollUntilVisible:
    element:
      text: "Run ZK self-test"
    direction: DOWN
    timeout: 20000
- tapOn:
    text: "Run ZK self-test"
# Groth16 proving on a simulator can take a while; wait generously for the PASS line.
- extendedWaitUntil:
    visible: "ZK-SELFTEST: PASS"
    timeout: 180000
- assertVisible: "ZK-SELFTEST: PASS"
