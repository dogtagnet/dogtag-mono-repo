name: DogTag
options:
  bundleIdPrefix: io.liberalize
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    # The xcframework headers ship a module.modulemap; nothing else to set globally.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Automatic signing with the signed-in Apple Developer team (Zhenhao Wu).
    DEVELOPMENT_TEAM: AYDBUX9433
    CODE_SIGN_STYLE: Automatic

targets:
  DogTag:
    type: application
    platform: iOS
    sources:
      - path: DogTag
    dependencies:
      - framework: DogTagFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.liberalize.dogtag
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "DogTag scans verifier QR codes to sign verification consents."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "DogTag uses Face ID to protect your embedded wallet and authorize consent signing."
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        # The static lib has no embedded bitcode and is a plain archive; link directly.
        OTHER_LDFLAGS: -ObjC
        TARGETED_DEVICE_FAMILY: "1"
