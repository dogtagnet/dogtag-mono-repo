# ----------------------------------------------------------------------------------------------
# DogTag — ADMIN / CENTRAL stack (we host). impl §7.
#   web   : React SPA built by Vite, served by nginx        -> host 39741
#   api   : the Rust admin-api binary (multi-stage build)   -> host 39742  (internal 39742)
#   mongo : MongoDB 7, INTERNAL TO THE COMPOSE NETWORK ONLY -> NO host port (never published)
#
# Build context is the monorepo ROOT. Run from this directory: docker compose up -d (`make up-admin`).
# ----------------------------------------------------------------------------------------------
services:
  web:
    build:
      context: ../..
      dockerfile: stacks/admin/web/Dockerfile
    image: dogtag-admin-web
    ports:
      - "39741:80"          # host 39741 -> nginx :80
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: stacks/admin/api/Dockerfile
    image: dogtag-admin-api
    ports:
      - "39742:39742"       # host 39742 -> admin-api :39742
    env_file: .env
    environment:
      MONGO_URI: "mongodb://mongo:39743/dogtag"
    depends_on:
      - mongo
    volumes:
      - adminseed:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    # NO `ports:` mapping — internal to the compose network only (service name `mongo`, port 39743).
    expose:
      - "39743"
    command: ["mongod", "--port", "39743", "--bind_ip_all"]
    volumes:
      - admindata:/data/db
    restart: unless-stopped

networks:
  default:
    name: dogtag-admin

volumes:
  admindata: {}
  adminseed: {}
