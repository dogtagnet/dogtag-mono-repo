# vet-web nginx: serve the SPA with history-API fallback and proxy /api -> the api service
# (compose-internal DNS name `api`, listening on 41874). The browser only ever talks to web:80.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse-proxy (strip the /api prefix to match the Rust routes).
    location /api/ {
        proxy_pass http://api:41874/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
