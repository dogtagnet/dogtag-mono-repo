[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
evm_version = "paris"          # §13.1 M-4: consistent until ROAX PUSH0 confirmed
optimizer = true
optimizer_runs = 200
fs_permissions = [
    { access = "read", path = "../circuits/poseidon-vectors.json" },
    { access = "read", path = "test/poseidon6.initcode" },
    { access = "read-write", path = "deployments" },
]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "poseidon-solidity/=lib/poseidon-solidity/",
]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
roax = "${ROAX_RPC}"
